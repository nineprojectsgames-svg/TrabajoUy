<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenless Zone Zero — Wiki de Builds</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0c10;
    --surface:   #0f1219;
    --surface2:  #161b26;
    --border:    #1e2535;
    --accent:    #f5c400;
    --accent2:   #ff6b1a;
    --accent3:   #00d4ff;
    --text:      #c8d0e0;
    --text-dim:  #5a6478;
    --text-bright: #edf0f7;
    --red:       #ff3e5e;
    --green:     #00e5a0;
    --rank-s:    #f5c400;
    --rank-a:    #aa66ff;
    --rank-b:    #44aaff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.08) 2px, rgba(0,0,0,.08) 4px);
    pointer-events: none;
    z-index: 9999;
  }
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,12,16,.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; gap: 1.5rem;
    height: 60px;
  }
  .logo { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; font-weight: 700; letter-spacing: .12em; color: var(--accent); text-shadow: 0 0 20px rgba(245,196,0,.4); white-space: nowrap; }
  .logo span { color: var(--accent2); }
  .header-game { font-family: 'Share Tech Mono', monospace; font-size: .72rem; color: var(--text-dim); letter-spacing: .08em; border: 1px solid var(--border); padding: .2rem .6rem; border-radius: 2px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }
  #search-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: .8rem; padding: .4rem .8rem; border-radius: 3px; width: 200px; outline: none; transition: border-color .2s; }
  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--text-dim); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .status-dot.loading { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status-dot.error   { background: var(--red);   box-shadow: 0 0 8px var(--red); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .layout { display: flex; min-height: calc(100vh - 60px); }
  .sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 0; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .sidebar-section { padding: 0 1rem .5rem; font-family: 'Share Tech Mono', monospace; font-size: .65rem; color: var(--text-dim); letter-spacing: .12em; text-transform: uppercase; border-bottom: 1px solid var(--border); margin-bottom: .5rem; }
  .char-nav-item { display: flex; align-items: center; gap: .6rem; padding: .5rem 1rem; cursor: pointer; transition: background .15s; border-left: 3px solid transparent; font-family: 'Rajdhani', sans-serif; font-size: .95rem; font-weight: 600; letter-spacing: .04em; color: var(--text); }
  .char-nav-item:hover { background: var(--surface2); color: var(--text-bright); }
  .char-nav-item.active { border-left-color: var(--accent); background: rgba(245,196,0,.06); color: var(--accent); }
  .char-nav-item img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); background: var(--surface2); flex-shrink: 0; }
  .nav-rank-badge { margin-left: auto; font-family: 'Share Tech Mono', monospace; font-size: .65rem; padding: .1rem .35rem; border-radius: 2px; background: rgba(245,196,0,.12); color: var(--rank-s); border: 1px solid rgba(245,196,0,.25); }
  main { flex: 1; padding: 2rem; overflow-y: auto; }
  .state-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; gap: 1rem; font-family: 'Share Tech Mono', monospace; color: var(--text-dim); }
  .state-screen .big-icon { font-size: 3rem; }
  .state-screen h2 { font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--text-bright); letter-spacing: .08em; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .char-card { max-width: 960px; animation: fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .char-header { display: flex; align-items: flex-start; gap: 1.5rem; padding: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-bottom: 2px solid var(--accent); margin-bottom: 1.5rem; position: relative; overflow: hidden; }
  .char-header::before { content: ''; position: absolute; top: 0; right: 0; width: 300px; height: 100%; background: linear-gradient(90deg, transparent, rgba(245,196,0,.03)); pointer-events: none; }
  .char-avatar { width: 88px; height: 88px; border-radius: 4px; object-fit: cover; border: 2px solid var(--accent); background: var(--surface2); flex-shrink: 0; box-shadow: 0 0 20px rgba(245,196,0,.2); }
  .char-info { flex: 1; }
  .char-name { font-family: 'Rajdhani', sans-serif; font-size: 2rem; font-weight: 700; letter-spacing: .08em; color: var(--text-bright); text-shadow: 0 0 30px rgba(245,196,0,.15); line-height: 1; margin-bottom: .4rem; }
  .char-tags { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: .8rem; }
  .tag { font-family: 'Share Tech Mono', monospace; font-size: .68rem; padding: .15rem .5rem; border-radius: 2px; letter-spacing: .06em; }
  .tag-faction  { background: rgba(0,212,255,.1); border: 1px solid rgba(0,212,255,.3); color: var(--accent3); }
  .tag-element  { background: rgba(255,107,26,.1); border: 1px solid rgba(255,107,26,.3); color: var(--accent2); }
  .tag-role     { background: rgba(245,196,0,.1);  border: 1px solid rgba(245,196,0,.3);  color: var(--accent); }
  .tag-rarity   { background: rgba(170,102,255,.1); border: 1px solid rgba(170,102,255,.3); color: var(--rank-a); }
  .char-score-big { display: flex; align-items: center; font-family: 'Rajdhani', sans-serif; font-size: 3rem; font-weight: 700; color: var(--accent); line-height: 1; gap: .3rem; align-self: center; text-shadow: 0 0 30px rgba(245,196,0,.5); flex-shrink: 0; }
  .char-score-big .score-label { font-size: .75rem; font-weight: 400; color: var(--text-dim); letter-spacing: .08em; align-self: flex-end; padding-bottom: .4rem; font-family: 'Share Tech Mono', monospace; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-bottom: 1.2rem; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.2rem; margin-bottom: 1.2rem; }
  .span-2 { grid-column: span 2; }
  .panel { background: var(--surface); border: 1px solid var(--border); padding: 1.1rem 1.2rem; }
  .panel-title { font-family: 'Share Tech Mono', monospace; font-size: .68rem; letter-spacing: .12em; color: var(--accent); text-transform: uppercase; margin-bottom: .9rem; display: flex; align-items: center; gap: .5rem; }
  .panel-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
  .rank-list { display: flex; flex-direction: column; gap: .65rem; }
  .rank-row { display: flex; align-items: center; gap: .75rem; }
  .rank-label { font-family: 'Barlow', sans-serif; font-size: .8rem; font-weight: 600; color: var(--text); width: 175px; flex-shrink: 0; letter-spacing: .02em; }
  .rank-bar-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .rank-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width .8s cubic-bezier(.25,.46,.45,.94); box-shadow: 0 0 6px rgba(245,196,0,.4); }
  .rank-value { font-family: 'Share Tech Mono', monospace; font-size: .75rem; color: var(--accent); width: 22px; text-align: right; flex-shrink: 0; }
  .rank-row.zero .rank-bar-fill { background: var(--border); box-shadow: none; }
  .rank-row.zero .rank-value { color: var(--text-dim); }
  .necessity { display: inline-block; font-family: 'Share Tech Mono', monospace; font-size: .72rem; padding: .2rem .65rem; border-radius: 2px; letter-spacing: .06em; font-weight: 700; margin-top: .3rem; }
  .nec-0  { background: rgba(90,100,120,.2); border: 1px solid rgba(90,100,120,.4); color: var(--text-dim); }
  .nec-1  { background: rgba(0,229,160,.08); border: 1px solid rgba(0,229,160,.3); color: var(--green); }
  .nec-2  { background: rgba(68,170,255,.08); border: 1px solid rgba(68,170,255,.3); color: var(--rank-b); }
  .nec-3  { background: rgba(245,196,0,.08); border: 1px solid rgba(245,196,0,.3); color: var(--accent); }
  .nec-4  { background: rgba(255,107,26,.12); border: 1px solid rgba(255,107,26,.4); color: var(--accent2); }
  .nec-5  { background: rgba(255,62,94,.12); border: 1px solid rgba(255,62,94,.4); color: var(--red); }
  .info-row { display: flex; flex-direction: column; gap: .25rem; padding: .55rem 0; border-bottom: 1px solid var(--border); }
  .info-row:last-child { border-bottom: none; }
  .info-key { font-family: 'Share Tech Mono', monospace; font-size: .65rem; letter-spacing: .1em; color: var(--text-dim); text-transform: uppercase; }
  .info-val { font-size: .88rem; color: var(--text-bright); font-weight: 400; }
  .info-val .reason { color: var(--text-dim); font-size: .82rem; font-weight: 300; display: block; margin-top: .1rem; }
  .weapon-chain { display: flex; align-items: center; flex-wrap: wrap; gap: .4rem; margin-top: .2rem; }
  .weapon-item { font-family: 'Rajdhani', sans-serif; font-size: .9rem; font-weight: 600; color: var(--text-bright); padding: .2rem .5rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 2px; }
  .weapon-item.best { border-color: rgba(245,196,0,.4); color: var(--accent); background: rgba(245,196,0,.06); }
  .weapon-sep { color: var(--accent2); font-weight: 700; font-size: 1rem; }
  .disk-set { padding: .5rem .7rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 2px; margin-bottom: .5rem; font-size: .85rem; display: flex; align-items: center; gap: .5rem; }
  .disk-set .rank-num { font-family: 'Share Tech Mono', monospace; font-size: .65rem; color: var(--accent); background: rgba(245,196,0,.1); padding: .1rem .3rem; border-radius: 2px; flex-shrink: 0; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem; margin-top: .2rem; }
  .stat-cell { background: var(--surface2); border: 1px solid var(--border); padding: .5rem .6rem; border-radius: 2px; }
  .stat-cell .slot-label { font-family: 'Share Tech Mono', monospace; font-size: .6rem; color: var(--accent2); letter-spacing: .08em; margin-bottom: .2rem; }
  .stat-cell .stat-name { font-size: .82rem; font-weight: 600; color: var(--text-bright); line-height: 1.3; }
  .substats-list { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .5rem; }
  .substat-chip { font-family: 'Share Tech Mono', monospace; font-size: .67rem; padding: .15rem .45rem; background: rgba(0,212,255,.06); border: 1px solid rgba(0,212,255,.2); color: var(--accent3); border-radius: 2px; }
  .stat-numbers { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: .5rem; margin-top: .2rem; }
  .stat-num-cell { background: var(--surface2); border: 1px solid var(--border); padding: .5rem .7rem; border-radius: 2px; }
  .stat-num-cell .sn-key { font-family: 'Share Tech Mono', monospace; font-size: .62rem; color: var(--text-dim); letter-spacing: .08em; margin-bottom: .15rem; }
  .stat-num-cell .sn-val { font-family: 'Rajdhani', sans-serif; font-size: 1.05rem; font-weight: 700; color: var(--text-bright); }
  .stat-num-cell.ideal .sn-val { color: var(--accent); text-shadow: 0 0 10px rgba(245,196,0,.3); }
  .tip-item { display: flex; gap: .65rem; padding: .55rem 0; border-bottom: 1px solid var(--border); font-size: .86rem; color: var(--text); line-height: 1.5; }
  .tip-item:last-child { border-bottom: none; }
  .tip-bullet { color: var(--accent2); font-family: 'Share Tech Mono', monospace; font-size: .8rem; flex-shrink: 0; margin-top: .05rem; }
  .dupe-item { padding: .5rem .7rem; background: var(--surface2); border-left: 3px solid var(--accent); margin-bottom: .5rem; font-size: .85rem; color: var(--text-bright); }
  .dupe-item .dupe-label { font-family: 'Share Tech Mono', monospace; font-size: .62rem; color: var(--accent2); letter-spacing: .08em; margin-bottom: .2rem; }
  .empty-val { font-style: italic; color: var(--text-dim); font-size: .82rem; }
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; text-align: center; gap: 1rem; }
  .welcome-title { font-family: 'Rajdhani', sans-serif; font-size: 2.2rem; font-weight: 700; letter-spacing: .1em; color: var(--text-bright); }
  .welcome-title span { color: var(--accent); text-shadow: 0 0 20px rgba(245,196,0,.4); }
  .welcome-sub { color: var(--text-dim); font-family: 'Share Tech Mono', monospace; font-size: .8rem; letter-spacing: .05em; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
 @media (max-width: 768px) {
  /* ===== MENÚ HAMBURGUESA ===== */
  .sidebar {
    position: fixed;
    top: 60px;
    left: -280px;
    width: 280px;
    height: calc(100vh - 60px);
    background: var(--surface);
    z-index: 1000;
    transition: left 0.3s ease;
    border-right: 1px solid var(--border);
    box-shadow: 2px 0 12px rgba(0,0,0,0.3);
    overflow-y: auto;
  }
  .sidebar.open {
    left: 0;
  }
  /* Botón hamburguesa (si no existe, lo agregamos) */
  #menu-toggle {
    display: block !important;
    background: none;
    border: none;
    color: var(--accent);
    font-size: 1.8rem;
    cursor: pointer;
    padding: 0 0.5rem;
    margin-left: 0.5rem;
  }
  /* Overlay para cerrar al tocar fuera */
  .menu-overlay {
    position: fixed;
    top: 60px;
    left: 0;
    width: 100%;
    height: calc(100vh - 60px);
    background: rgba(0,0,0,0.6);
    z-index: 999;
    display: none;
  }
  .menu-overlay.active {
    display: block;
  }

  /* ===== AJUSTES GENERALES ===== */
  main {
    padding: 0.8rem;
    width: 100%;
  }
  .grid-2, .grid-3 {
    grid-template-columns: 1fr !important;
    gap: 0.8rem;
  }
  .char-card {
    margin: 0;
  }
  .char-header {
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 1rem;
  }
  .char-avatar {
    width: 80px;
    height: 80px;
  }
  .char-name {
    font-size: 1.6rem;
  }
  .char-score-big {
    font-size: 2.2rem;
    margin-top: 0.5rem;
  }
  .char-tags {
    justify-content: center;
  }
  .panel {
    padding: 0.8rem;
  }
  .rank-row {
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .rank-label {
    width: 100%;
    font-size: 0.8rem;
  }
  .rank-bar-track {
    width: 100%;
  }
  .stats-grid {
    grid-template-columns: 1fr;
    gap: 0.5rem;
  }
  .stat-numbers {
    grid-template-columns: 1fr 1fr;
  }
  .weapon-chain {
    flex-direction: column;
    align-items: flex-start;
  }
  .weapon-item {
    font-size: 0.8rem;
    width: 100%;
    text-align: center;
  }
  .weapon-sep {
    display: none;
  }
  .disk-set {
    font-size: 0.8rem;
  }
  .emoji-badge {
    font-size: 1.2rem;
  }
  .info-val {
    font-size: 0.85rem;
  }
  .tip-item {
    font-size: 0.8rem;
  }
  /* Elementos de la barra lateral más táctiles */
  .char-nav-item {
    padding: 0.8rem 1rem;
    gap: 0.8rem;
  }
  .char-nav-item img {
    width: 40px;
    height: 40px;
  }
  .nav-rank-badge {
    font-size: 0.8rem;
    padding: 0.2rem 0.5rem;
  }
}

.emoji-badge {
  display: inline-block;
  transition: transform 0.1s;
}
.emoji-badge:hover {
  transform: scale(1.15);
}
@media (max-width: 768px) {
  .emoji-badge {
    font-size: 1.1rem;
  }
}

/* Bordes para rareza */
.char-avatar.rareza-a {
  border-color: #aa66ff;  /* Violeta */
  box-shadow: 0 0 12px rgba(170, 102, 255, 0.5);
}
.char-avatar.rareza-s {
  border-color: #f5c400;  /* Dorado */
  box-shadow: 0 0 12px rgba(245, 196, 0, 0.6);
}

/* Colores para la puntuación promedio */
.score-gris { color: #6c757d; text-shadow: none; }
.score-verde { color: #28a745; text-shadow: 0 0 6px rgba(40,167,69,0.3); }
.score-morado { color: #aa66ff; text-shadow: 0 0 6px rgba(170,102,255,0.3); }
.score-dorado { color: #f5c400; text-shadow: 0 0 6px rgba(245,196,0,0.3); }
.score-celeste { color: #00d4ff; text-shadow: 0 0 6px rgba(0,212,255,0.3); }
.score-multicolor {
  background: linear-gradient(90deg, #f5c400, #ff6b1a, #00d4ff, #aa66ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: none;
}

/* Tooltips de puntuaciones */
.score-tooltip {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
}
.info-icon {
  display: inline-block;
  width: 16px;
  height: 16px;
  background: rgba(0,212,255,0.2);
  color: var(--accent3);
  border-radius: 50%;
  text-align: center;
  line-height: 16px;
  font-size: 11px;
  font-weight: bold;
  cursor: help;
  margin-left: 0.3rem;
  transition: all 0.2s;
}
.info-icon:hover {
  background: var(--accent3);
  color: var(--bg);
  transform: scale(1.1);
}

/* Estilos para los filtros */
#filters {
  padding: 0.5rem 1rem;
  margin-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}
.filter-group {
  margin-bottom: 1rem;
}
.filter-group label {
  display: block;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 0.4rem;
  text-transform: uppercase;
}
.filter-options {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.filter-options label {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-family: 'Barlow', sans-serif;
  font-size: 0.75rem;
  text-transform: none;
  color: var(--text);
  background: var(--surface2);
  padding: 0.2rem 0.6rem;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.2s;
}
.filter-options label:hover {
  background: var(--border);
}
.filter-options input {
  margin: 0;
  accent-color: var(--accent);
}

/* Popup flotante para descripciones táctiles */
.description-popup {
  position: fixed;
  background: var(--surface2);
  border: 1px solid var(--accent);
  border-radius: 12px;
  padding: 0.8rem 1rem;
  max-width: 260px;
  font-size: 0.85rem;
  color: var(--text-bright);
  z-index: 10000;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
  opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none;
}
.description-popup.visible {
  opacity: 1;
  pointer-events: auto;
}
.description-popup .close-popup {
  pointer-events: auto;
  background: none;
  border: none;
  color: var(--accent);
  float: right;
  cursor: pointer;
  font-size: 1.2rem;
  line-height: 1;
  margin-left: 0.5rem;
  padding: 0;
}
.description-popup .close-popup:hover {
  color: var(--accent2);
}

/* Acordeón de filtros */
.filter-accordion {
  margin-bottom: 0.5rem;
}
.filter-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  padding: 0.5rem 0;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  color: var(--accent);
  text-transform: uppercase;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-bottom: 0.5rem;

<script>
// ══════════════════════════════════════════════════════════
// CONFIGURACIÓN - ESTRUCTURA HORIZONTAL (primera fila = claves)
// ══════════════════════════════════════════════════════════
const wikiContainer = document.getElementById('wiki-container');
const tierListContainer = document.getElementById('tierlist-container');

const SHEET_CONFIG = {
  sheetId: '1hvggH2H5F27AyvaQnZs9CAPu6V78TZBa2SKq445Jad8',
  sheetName: 'Zenless Builds',
};

const EXPECTED_KEYS = [
  'nombre', 'imagen', 'faccion', 'elemento', 'rol', 'rareza',
  'sc_utilidad', 'sc_facilidad_build', 'sc_build_value', 'sc_pull_value',
  'sc_gameplay', 'sc_f2p_friendly', 'sc_consistencia',
  'nec_arma', 'nec_dupes', 'mejores_dupes', 'mejores_compas', 'mejor_bangbu',
  'w_engines', 'sets_discos', 'disco_slot4', 'disco_slot5', 'disco_slot6',
  'disco_sub', 'stats_basicas', 'stats_ideales', 'consejos', 'resumen'
];

// Descripciones para los tooltips de puntuaciones
const SCORE_LABELS = {
  sc_utilidad: 'Utilidad',
  sc_facilidad_build: 'Facilidad de Buildeo',
  sc_build_value: 'Build Value',
  sc_pull_value: 'Pull Value',
  sc_gameplay: 'Facilidad de Gameplay',
  sc_f2p_friendly: 'F2P Friendly',
  sc_consistencia: 'Consistencia',
};

const SCORE_TOOLTIPS = {
  sc_utilidad: 'Qué tan útil es hoy en día el personaje, qué tanto te ayuda en el juego en general.',
  sc_facilidad_build: 'Qué fácil es llegar a unas estadísticas para que el personaje cumpla su función.',
  sc_build_value: 'Qué tanto vale la pena sobreinvertir en este personaje.',
  sc_pull_value: 'Qué tanto vale la pena tirar por este personaje (o sus dupes si es regalado).',
  sc_gameplay: 'Qué tan fácil es dominar su gameplay para sacar puntuaciones decentes.',
  sc_f2p_friendly: 'Qué tan amigable es con cuentas con pocas armas rango S, pocos personajes rango S y casi sin dupes.',
  sc_consistencia: 'Qué tan consistente es en sus rotaciones y si se basa mucho en RNG o situaciones específicas para brillar.',
};

const NEC_LEVELS = ['Nada', 'Poca', 'Media', 'Mucha', 'Obligatoria'];

// Diccionario de emojis y tooltips
const EMOJI_DESCRIPTIONS = {
  '💔': 'Reduce defensas / resistencias del enemigo',
  '📈': 'Amplifica el daño de todo el equipo',
  '💉': 'Cura a los aliados',
  '🛡️': 'Otorga escudos a los aliados',
  '⛓️': 'Habilita o potencia ataques en cadena',
  '✨': 'Permite usar ultimates adicionales',
  '🎯': 'Otorga daño extra',
  '⚡': 'Otorga regeneración de energía extra',
  '🌀': 'Ataca sin estar en el campo activo',
  '🌸': 'Activa reacciones de Bloom',
  '🌪️': 'Activa reacciones de Disorder',
  '💥': 'Activa reacciones de Totalize',
  '💀': 'Alto daño con su Ultimate',
  '🔗': 'Alto daño en ataques en cadena',
  '⚙️': 'Alto daño con habilidad EX',
  '🗡️': 'Alto daño con ataques básicos, cargados o rápidos',
  '⏳': 'Requiere mucho tiempo activo en campo',
  '🔁': 'Cambia rápido, poco tiempo en campo',
  '🤺': 'Puede hacer parrys / contraataques',
  '⚔️': 'Escala con ATAQUE',
  '❤️': 'Escala con VIDA máxima',
  '🔰': 'Escala con DEFENSA',
  '🌡️': 'Escala con Maestría de Anomalía',
  '🎲': 'Escala con Probabilidad de Anomalía',
  '🔋': 'Escala con Recuperación de Energía'
};

// ══════════════════════════════════════════════════════════
// FETCH DATOS (CSV)
// ══════════════════════════════════════════════════════════
async function fetchSheetData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_CONFIG.sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_CONFIG.sheetName)}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const csvText = await resp.text();
  const rows = [];
  const lines = csvText.split(/\r?\n/);
  for (const line of lines) {
    if (line.trim() === '') continue;
    const cells = [];
    let inQuote = false;
    let current = '';
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') inQuote = !inQuote;
      else if (ch === ',' && !inQuote) { cells.push(current.trim()); current = ''; }
      else current += ch;
    }
    cells.push(current.trim());
    rows.push(cells);
  }
  return rows;
}

function buildCharacters(rows) {
  if (rows.length < 2) return [];
  const headers = rows[0];
  const colIndexToKey = {};
  for (let i = 0; i < headers.length; i++) {
    const header = headers[i] ? headers[i].toLowerCase().trim() : '';
    if (EXPECTED_KEYS.includes(header)) colIndexToKey[i] = header;
  }
  const nombreIndex = Object.keys(colIndexToKey).find(idx => colIndexToKey[idx] === 'nombre');
  if (nombreIndex === undefined) throw new Error('No se encontró la columna "nombre" en la primera fila.');
  const characters = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.length === 0) continue;
    const charObj = {};
    for (const colIdx in colIndexToKey) {
      let value = row[colIdx] !== undefined ? row[colIdx] : '';
      value = value.replace(/^"|"$/g, '');
      charObj[colIndexToKey[colIdx]] = value;
    }
    if (charObj.nombre && charObj.nombre.trim() !== '') characters.push(charObj);
  }
  return characters;
}

// ══════════════════════════════════════════════════════════
// UTILIDADES
// ══════════════════════════════════════════════════════════
function calcPromedio(char) {
  let total = 0, count = 0;
  for (const key of Object.keys(SCORE_LABELS)) {
    let val = parseFloat(char[key]);
    if (!isNaN(val) && val > 0) { total += val; count++; }
  }
  return count === 0 ? null : (total / count).toFixed(1);
}

function getScoreClass(avg) {
  if (avg === null) return '';
  const num = parseFloat(avg);
  if (num < 3) return 'score-gris';
  if (num < 5) return 'score-verde';
  if (num < 7) return 'score-morado';
  if (num < 8) return 'score-dorado';
  if (num < 9) return 'score-celeste';
  return 'score-multicolor';
}

function necClass(val) {
  const idx = NEC_LEVELS.findIndex(n => n.toLowerCase() === val.toLowerCase().trim());
  if (idx < 0) return 'nec-0';
  return `nec-${idx+1}`;
}

function splitPipe(str) {
  if (!str) return [];
  return str.split('|').map(s => s.trim()).filter(Boolean);
}

// Helper: determina si un string es una URL de imagen
function isImageUrl(str) {
  if (!str) return false;
  str = str.trim();
  // Si no empieza con http, no es URL
  if (!str.startsWith('http')) return false;
  // Lista de extensiones de imagen comunes
  const imageExtensions = /\.(png|jpg|jpeg|gif|webp|svg|bmp|ico)(\?.*)?$/i;
  if (imageExtensions.test(str)) return true;
  // Dominios conocidos de imágenes (wikia, nocookie, gg, drive.google.com, etc.)
  const imageDomains = /(wikia|nocookie|gg|drive\.google\.com|googleusercontent|imgur|ibb\.co|cdn\.discordapp|github\.io)/i;
  if (imageDomains.test(str)) return true;
  // Si tiene 'image' en la URL, también lo consideramos
  if (str.includes('/image/') || str.includes('img=')) return true;
  // Para URLs de Google Drive: convertir a link directo si es necesario
  if (str.includes('drive.google.com')) {
    // Podríamos transformar la URL, pero por ahora la marcamos como imagen
    return true;
  }
  return false;
}

function renderEmojis(str) {
  if (!str) return '';
  const emojis = str.split(/\s+/).filter(e => e.trim().length > 0);
  return emojis.map(emoji => {
    const description = EMOJI_DESCRIPTIONS[emoji] || 'Sin descripción';
    // Escapamos comillas dobles para que no rompan el atributo
    const safeDesc = description.replace(/"/g, '&quot;');
    return `<span class="emoji-badge" data-desc="${safeDesc}" style="cursor:pointer; font-size:1.3rem; margin-right:0.3rem;">${emoji}</span>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════
// FILTROS Y BÚSQUEDA
// ══════════════════════════════════════════════════════════
let allChars = [];
let activeIdx = -1;
let currentSearchTerm = '';
let selectedElements = new Set();
let selectedRarities = new Set();
let selectedRoles = new Set();

function getUniqueValues(prop) {
  return [...new Set(allChars.map(c => c[prop]).filter(v => v && v.trim() !== ''))];
}

function renderFilters() {
  const container = document.getElementById('filters');
  if (!container) return;
  
  const elements = getUniqueValues('elemento');
  const rarities = getUniqueValues('rareza');
  const roles = getUniqueValues('rol');
  
  let html = '';
  
  // Función auxiliar para crear un grupo de filtros
  function renderFilterGroup(title, items, selectedSet, className) {
    if (!items.length) return '';
    let groupHtml = `<div class="filter-accordion">
      <div class="filter-header" data-group="${className}">
        <span>${title}</span>
        <span class="accordion-icon">▼</span>
      </div>
      <div class="filter-content" id="filter-${className}">
        <div class="filter-options">`;
    items.forEach(item => {
      groupHtml += `<label><input type="checkbox" value="${item}" class="filter-${className}" ${selectedSet.has(item) ? 'checked' : ''}> ${item}</label>`;
    });
    groupHtml += `</div></div></div>`;
    return groupHtml;
  }
  
  html += renderFilterGroup('Elemento', elements, selectedElements, 'element');
  html += renderFilterGroup('Rango', rarities, selectedRarities, 'rarity');
  html += renderFilterGroup('Rol', roles, selectedRoles, 'role');
  
  container.innerHTML = html;
  
  // Adjuntar eventos a los checkboxes
  document.querySelectorAll('.filter-element').forEach(cb => cb.addEventListener('change', () => {
    if (cb.checked) selectedElements.add(cb.value);
    else selectedElements.delete(cb.value);
    updateFilteredList();
  }));
  document.querySelectorAll('.filter-rarity').forEach(cb => cb.addEventListener('change', () => {
    if (cb.checked) selectedRarities.add(cb.value);
    else selectedRarities.delete(cb.value);
    updateFilteredList();
  }));
  document.querySelectorAll('.filter-role').forEach(cb => cb.addEventListener('change', () => {
    if (cb.checked) selectedRoles.add(cb.value);
    else selectedRoles.delete(cb.value);
    updateFilteredList();
  }));
  
  // Inicializar el comportamiento de acordeón
  document.querySelectorAll('.filter-header').forEach(header => {
    const groupName = header.dataset.group;
    const content = document.getElementById(`filter-${groupName}`);
    const icon = header.querySelector('.accordion-icon');
    // Por defecto, todos los grupos cerrados
    content.classList.remove('open');
    icon.classList.remove('open');
    header.addEventListener('click', (e) => {
      e.stopPropagation();
      content.classList.toggle('open');
      icon.classList.toggle('open');
    });
  });
}

function filterCharacters() {
  return allChars.filter(char => {
    // Filtro búsqueda
    if (currentSearchTerm && !char.nombre.toLowerCase().includes(currentSearchTerm)) return false;
    // Filtro elemento
    if (selectedElements.size && !selectedElements.has(char.elemento)) return false;
    // Filtro rareza
    if (selectedRarities.size && !selectedRarities.has(char.rareza)) return false;
    // Filtro rol
    if (selectedRoles.size && !selectedRoles.has(char.rol)) return false;
    return true;
  });
}

function updateFilteredList() {
  const filtered = filterCharacters();
  renderSidebar(filtered);
  // Si el personaje activo ya no está en los filtrados, seleccionar el primero si existe
  if (activeIdx !== -1 && !filtered.includes(allChars[activeIdx])) {
    if (filtered.length > 0) {
      const newActive = allChars.indexOf(filtered[0]);
      selectChar(newActive);
    } else {
      activeIdx = -1;
      renderWelcome([]);
    }
  }
}

// ══════════════════════════════════════════════════════════
// RENDER (sidebar y personaje)
// ══════════════════════════════════════════════════════════
function renderSidebar(chars) {
  const nav = document.getElementById('char-nav');
  nav.innerHTML = '';
  chars.forEach((c, i) => {
    const avg = calcPromedio(c);
    const rarezaClass = c.rareza ? `rareza-${c.rareza.toLowerCase()}` : '';
    const item = document.createElement('div');
    item.className = 'char-nav-item' + (allChars.indexOf(c) === activeIdx ? ' active' : '');
    item.innerHTML = `
      <img src="${c.imagen || ''}" alt="${c.nombre}" class="char-avatar ${rarezaClass}" onerror="this.style.display='none'">
      <span>${c.nombre}</span>
      ${avg ? `<span class="nav-rank-badge ${getScoreClass(avg)}">${avg}</span>` : ''}
    `;
    item.addEventListener('click', () => selectChar(allChars.indexOf(c)));
    nav.appendChild(item);
  });
}

function selectChar(idx) {
  if (idx < 0 || idx >= allChars.length) return;
  activeIdx = idx;
  const filtered = filterCharacters();
  renderSidebar(filtered);
  renderChar(allChars[idx]);
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (window.innerWidth <= 768) {
    const sidebarElem = document.querySelector('.sidebar');
    if (sidebarElem && sidebarElem.classList.contains('open')) {
      if (typeof closeMenu === 'function') closeMenu();
    }
  }
}  // <--- CIERRE CORRECTO DE selectChar

function renderChar(c) {
  const avg = calcPromedio(c);
  // Generar filas de puntuaciones con tooltips
  const scoreRows = Object.entries(SCORE_LABELS).map(([key, label]) => {
    let val = parseFloat(c[key]);
    if (isNaN(val)) val = 0;
    const pct = (val / 10) * 100;
    const tooltip = SCORE_TOOLTIPS[key] || '';
    return `<div class="rank-row ${val === 0 ? 'zero' : ''}">
              <div class="rank-label">
                ${label}
                <span class="info-icon" data-tip="${tooltip.replace(/"/g, '&quot;')}">ⓘ</span>
              </div>
              <div class="rank-bar-track"><div class="rank-bar-fill" style="width:${pct}%"></div></div>
              <div class="rank-value">${val > 0 ? val : '—'}</div>
            </div>`;
  }).join('');

const engines = c.w_engines ? c.w_engines.split('>').map(s => s.trim()).filter(Boolean) : [];
const engineHTML = engines.length ? engines.map((e, i) => {
  if (isImageUrl(e)) {
    const borderStyle = i === 0 ? '2px solid var(--accent)' : '1px solid var(--border)';
    // Guardamos el texto original en el atributo data-text
    return `<img src="${e}" alt="w-engine" data-text="${e.replace(/"/g, '&quot;')}" style="width: 48px; height: 48px; border-radius: 8px; border: ${borderStyle}; margin: 0.2rem; background: var(--surface2); cursor: pointer;" title="W-Engine recomendado" onerror="this.onerror=null; this.outerHTML = '<span class=\'weapon-item ${i===0?'best':''}\'>' + this.getAttribute('data-text') + '</span>' + (${i < engines.length-1} ? '<span class=\'weapon-sep\'>›</span>' : '');">`;
  } else {
    return `<span class="weapon-item ${i===0?'best':''}">${e}</span>${i < engines.length-1 ? '<span class="weapon-sep">›</span>' : ''}`;
  }
}).join('') : '<span class="empty-val">Sin datos</span>';

const setsRaw = (c.sets_discos || '').split('>').map(s => s.trim()).filter(Boolean);
const setsHTML = setsRaw.length ? setsRaw.map((block, blockIdx) => {
  // Dentro de cada bloque, separamos las dos partes: 4p y 2p
  // El formato esperado es: "4 [set1] 2 [set2]" o también podría ser "4 [set1] 2 [set2]" con URLs o textos
  // Usamos una expresión regular para encontrar números al inicio de cada parte
  const parts = [];
  let remaining = block;
  // Buscar patrones como "4 " luego cualquier cosa hasta el siguiente " 2 " o hasta el final
  const match4 = remaining.match(/^(\d+)\s+(.+?)(?=\s+\d+\s+|$)/);
  if (match4) {
    const count4 = match4[1];
    let content4 = match4[2].trim();
    remaining = remaining.substring(match4[0].length).trim();
    // Ahora buscar "2 " y el resto
    const match2 = remaining.match(/^(\d+)\s+(.+)$/);
    if (match2) {
      const count2 = match2[1];
      let content2 = match2[2].trim();
      parts.push({ count: count4, content: content4 });
      parts.push({ count: count2, content: content2 });
    } else {
      // Si no hay segundo número, asumimos que solo hay un set (caso poco común pero posible)
      parts.push({ count: count4, content: content4 });
    }
  } else {
    // Si no hay números al inicio, tratamos el bloque completo como un solo set (para compatibilidad)
    parts.push({ count: (blockIdx+1).toString(), content: block });
  }
  
  // Generar HTML para cada parte
  const partsHtml = parts.map(part => {
    const { count, content } = part;
    let innerHtml = '';
    if (isImageUrl(content)) {
      const safeUrl = content.replace(/"/g, '&quot;');
      innerHtml = `<div style="display: flex; flex-direction: column; align-items: center;">
        <img src="${content}" alt="set disco" style="width: 48px; height: 48px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2);" onerror="this.onerror=null; this.outerHTML = '<span>' + this.getAttribute('data-text') + '</span>';" data-text="${safeUrl}">
        <span style="font-size: 0.65rem; margin-top: 0.2rem;">${count}p</span>
      </div>`;
    } else {
      innerHtml = `<span class="rank-num">${count}</span><span>${content}</span>`;
    }
    return innerHtml;
  }).join('');
  
  // Envolver la combinación en un div con clase disk-set (para mantener estilo)
  return `<div class="disk-set" style="display: flex; gap: 1rem; align-items: center; justify-content: space-around;">${partsHtml}</div>`;
}).join('') : '<span class="empty-val">Sin datos</span>';

const compas = splitPipe(c.mejores_compas);

let sidebar;
let overlay;
let menuToggle;

function closeMenu() {
  if (sidebar) sidebar.classList.remove('open');
  if (overlay) overlay.classList.remove('active');
}

function openMenu() {
  if (sidebar) sidebar.classList.add('open');
  if (overlay) overlay.classList.add('active');
}

function initMobileMenu() {
  menuToggle = document.getElementById('menu-toggle');
  sidebar = document.querySelector('.sidebar');
  overlay = document.getElementById('menu-overlay');
  if (!menuToggle || !sidebar || !overlay) return;
  menuToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    if (sidebar.classList.contains('open')) closeMenu();
    else openMenu();
  });
  overlay.addEventListener('click', closeMenu);
  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) closeMenu();
  });
}

// ===================== TIER LIST =====================
let currentTierMode = 'auto'; // 'auto' o 'custom'
let customTiers = [];  // array de objetos: { name, characters: [charIndex] }

// Obtener todas las clases (roles) únicas de personajes
function getAllRoles() {
  return [...new Set(allChars.map(c => c.rol).filter(r => r && r.trim() !== ''))];
}

// Generar tier list automática: agrupa por rol y rango de promedio
function generateAutoTierList() {
  const roles = getAllRoles();
  const tiers = [
    { min: 9, max: 10, name: 'S+ (9-10)' },
    { min: 8, max: 8.99, name: 'S (8-9)' },
    { min: 7, max: 7.99, name: 'A (7-8)' },
    { min: 5, max: 6.99, name: 'B (5-7)' },
    { min: 3, max: 4.99, name: 'C (3-5)' },
    { min: 0, max: 2.99, name: 'D (0-3)' }
  ];
  
  let html = `<div class="tier-mode-selector">
    <button class="tier-auto-btn active">📊 Automática por promedio</button>
    <button class="tier-custom-btn">🎮 Personalizada (arrastrable)</button>
  </div>`;
  
  for (const rol of roles) {
    html += `<div class="tier-rol-group" style="margin-bottom:2rem;">
      <h3 style="color:var(--accent2); margin-bottom:0.5rem;">${rol}</h3>`;
    for (const tier of tiers) {
      const charsInTier = allChars.filter(c => {
        const avg = parseFloat(calcPromedio(c));
        return c.rol === rol && !isNaN(avg) && avg >= tier.min && avg <= tier.max;
      });
      if (charsInTier.length === 0) continue;
      html += `<div class="tier-row">
        <div class="tier-header">${tier.name}</div>
        <div class="tier-cards">`;
      for (const ch of charsInTier) {
        const avg = calcPromedio(ch);
        html += `<div class="tier-card" data-char-idx="${allChars.indexOf(ch)}">
          <img src="${ch.imagen || ''}" alt="${ch.nombre}" onerror="this.style.display='none'">
          <span>${ch.nombre}</span>
          <span class="avg-score">${avg || '—'}</span>
        </div>`;
      }
      html += `</div></div>`;
    }
    html += `</div>`;
  }
  return html;
}

// Inicializar tier list personalizada (cargar desde localStorage o crear por defecto)
function initCustomTiers() {
  const saved = localStorage.getItem('zzz_custom_tiers');
  if (saved) {
    customTiers = JSON.parse(saved);
  } else {
    // Por defecto: crear filas S, A, B, C, D con personajes ordenados por promedio
    const sorted = [...allChars].sort((a,b) => parseFloat(calcPromedio(b)) - parseFloat(calcPromedio(a)));
    const tiersDefault = [
      { name: 'S (9-10)', characters: [] },
      { name: 'A (7-9)', characters: [] },
      { name: 'B (5-7)', characters: [] },
      { name: 'C (3-5)', characters: [] },
      { name: 'D (0-3)', characters: [] },
    ];
    for (const ch of sorted) {
      const avg = parseFloat(calcPromedio(ch));
      let tierIdx = 0;
      if (avg >= 9) tierIdx = 0;
      else if (avg >= 7) tierIdx = 1;
      else if (avg >= 5) tierIdx = 2;
      else if (avg >= 3) tierIdx = 3;
      else tierIdx = 4;
      tiersDefault[tierIdx].characters.push(allChars.indexOf(ch));
    }
    customTiers = tiersDefault;
  }
}

// Guardar tier list personalizada en localStorage
function saveCustomTiers() {
  localStorage.setItem('zzz_custom_tiers', JSON.stringify(customTiers));
}

// Renderizar la tier list personalizada (drag & drop)
function renderCustomTierList() {
  let html = `<div class="tier-mode-selector">
    <button class="tier-auto-btn">📊 Automática por promedio</button>
    <button class="tier-custom-btn active">🎮 Personalizada (arrastrable)</button>
  </div>
  <div id="custom-tier-container">`;
  
  customTiers.forEach((tier, idx) => {
    html += `<div class="tier-row" data-tier-index="${idx}">
      <div class="tier-header">
        <input type="text" class="tier-name-input" value="${tier.name}" style="background:var(--surface2); border:1px solid var(--border); color:var(--text-bright); padding:0.2rem 0.5rem; border-radius:4px; width:120px;">
        <button class="remove-tier-btn" data-tier="${idx}" style="background:none; border:none; color:var(--red); cursor:pointer;">✕</button>
      </div>
      <div class="tier-cards" data-tier="${idx}" data-dropzone="true">
  `;
    for (const charIdx of tier.characters) {
      const ch = allChars[charIdx];
      if (!ch) continue;
      const avg = calcPromedio(ch);
      html += `<div class="tier-card" draggable="true" data-char-idx="${charIdx}" data-origin-tier="${idx}">
        <img src="${ch.imagen || ''}" alt="${ch.nombre}" onerror="this.style.display='none'">
        <span>${ch.nombre}</span>
        <span class="avg-score">${avg || '—'}</span>
      </div>`;
    }
    html += `</div></div>`;
  });
  
  html += `<div class="custom-tier-actions">
    <button id="add-tier-btn">➕ Añadir fila</button>
    <button id="reset-custom-tier" class="reset-tier-btn">⟳ Restablecer por promedio</button>
  </div></div>`;
  
  document.getElementById('tierlist-container').innerHTML = html;
  
  // Adjuntar eventos de drag & drop
  attachDragAndDropEvents();
  // Eventos para botones de eliminar fila, añadir fila, reset
  document.querySelectorAll('.remove-tier-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const tierIdx = parseInt(btn.dataset.tier);
      if (customTiers.length > 1) {
        // Mover personajes de la fila eliminada a la fila superior (si existe) o inferior
        const charsToMove = customTiers[tierIdx].characters;
        customTiers.splice(tierIdx, 1);
        if (customTiers.length > 0) {
          const targetIdx = Math.min(tierIdx, customTiers.length-1);
          customTiers[targetIdx].characters.push(...charsToMove);
        }
        saveCustomTiers();
        renderCustomTierList();
      }
    });
  });
  document.getElementById('add-tier-btn')?.addEventListener('click', () => {
    customTiers.push({ name: 'Nueva fila', characters: [] });
    saveCustomTiers();
    renderCustomTierList();
  });
  document.getElementById('reset-custom-tier')?.addEventListener('click', () => {
    initCustomTiers(); // reinicia según promedios
    saveCustomTiers();
    renderCustomTierList();
  });
  // Eventos para renombrar fila
  document.querySelectorAll('.tier-name-input').forEach((input, idx) => {
    input.addEventListener('change', (e) => {
      customTiers[idx].name = e.target.value;
      saveCustomTiers();
    });
  });
}

// Funciones para drag & drop
function attachDragAndDropEvents() {
  const cards = document.querySelectorAll('.tier-card');
  const dropZones = document.querySelectorAll('[data-dropzone="true"]');
  
  cards.forEach(card => {
    card.addEventListener('dragstart', handleDragStart);
    card.addEventListener('dragend', handleDragEnd);
    card.setAttribute('draggable', 'true');
  });
  dropZones.forEach(zone => {
    zone.addEventListener('dragover', handleDragOver);
    zone.addEventListener('drop', handleDrop);
  });
}

let draggedItem = null;
let draggedCharIdx = null;
let draggedOriginTier = null;

function handleDragStart(e) {
  draggedItem = this;
  draggedCharIdx = parseInt(this.dataset.charIdx);
  draggedOriginTier = parseInt(this.dataset.originTier);
  e.dataTransfer.setData('text/plain', draggedCharIdx);
  this.classList.add('dragging');
}

function handleDragEnd(e) {
  if (draggedItem) draggedItem.classList.remove('dragging');
  draggedItem = null;
  draggedCharIdx = null;
  draggedOriginTier = null;
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function handleDrop(e) {
  e.preventDefault();
  const targetZone = e.currentTarget;
  const targetTierIdx = parseInt(targetZone.dataset.tier);
  if (isNaN(targetTierIdx)) return;
  if (draggedCharIdx === null || draggedOriginTier === null) return;
  
  // Mover personaje de origen a destino
  const originTier = customTiers[draggedOriginTier];
  const charIndexInOrigin = originTier.characters.indexOf(draggedCharIdx);
  if (charIndexInOrigin !== -1) originTier.characters.splice(charIndexInOrigin, 1);
  customTiers[targetTierIdx].characters.push(draggedCharIdx);
  
  saveCustomTiers();
  renderCustomTierList();
}

// Mostrar/ocultar tier list y wiki
function showWiki() {
  document.getElementById('wiki-container').style.display = 'block';
  document.getElementById('tierlist-container').style.display = 'none';

function showTierList() {

}

// POPUP TÁCTIL PARA DESCRIPCIONES
// ══════════════════════════════════════════════════════════
let activePopup = null;

function showDescription(text, event) {
  // Cerrar popup previo si existe
  if (activePopup) activePopup.remove();
  
  const popup = document.createElement('div');
  popup.className = 'description-popup';
  popup.innerHTML = `<button class="close-popup">✕</button><div>${text}</div>`;
  document.body.appendChild(popup);
  
  // Posicionar cerca del elemento pulsado
  const rect = event.target.getBoundingClientRect();
  let left = rect.left + window.scrollX;
  let top = rect.bottom + window.scrollY + 8;
  
  // Evitar que se salga por la derecha
  const popupWidth = 260;
  if (left + popupWidth > window.innerWidth) {
    left = window.innerWidth - popupWidth - 10;
  }
  // Evitar que se salga por abajo
  const popupHeight = popup.offsetHeight;
  if (top + popupHeight > window.scrollY + window.innerHeight) {
    top = rect.top + window.scrollY - popupHeight - 8;
  }
  
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
  setTimeout(() => popup.classList.add('visible'), 10);
  activePopup = popup;
  
  // Cerrar con el botón X
  popup.querySelector('.close-popup').addEventListener('click', (e) => {
    e.stopPropagation();
    popup.remove();
    activePopup = null;
  });
  
  // Cerrar al hacer clic fuera del popup
  const closeHandler = (e) => {
    if (!popup.contains(e.target) && e.target !== event.target) {
      popup.remove();
      activePopup = null;
      document.removeEventListener('click', closeHandler);
    }
  };
  setTimeout(() => document.addEventListener('click', closeHandler), 0);
}

// Delegación de eventos para emojis e iconos de información
function setupDescriptionListeners() {
  document.addEventListener('click', function(e) {
    let target = e.target;
    // Emojis
    if (target.classList && target.classList.contains('emoji-badge')) {
      const desc = target.getAttribute('data-desc');
      if (desc) showDescription(desc, e);
      e.preventDefault();
      e.stopPropagation();
    }
    // Iconos de información
    else if (target.classList && target.classList.contains('info-icon')) {
      const tip = target.getAttribute('data-tip');
      if (tip) showDescription(tip, e);
      e.preventDefault();
      e.stopPropagation();
    }
  });
}
